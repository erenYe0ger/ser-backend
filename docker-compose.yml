version: "3.9"
services:
  # FastAPI application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ser_user:ser_password@postgres:5432/ser_db
      REDIS_URL: redis://redis:6379

  # PostgreSQL database service
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ser_user
      POSTGRES_PASSWORD: ser_password
      POSTGRES_DB: ser_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ser_user -d ser_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis cache service
  redis:
    image: redis:7
    ports:
      - "6379:6379"